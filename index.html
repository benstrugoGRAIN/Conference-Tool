<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #f4f5f7; color: #111827; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  input, select, textarea, button { font-family: 'DM Sans', system-ui, sans-serif; }
  input:focus, select:focus, textarea:focus { outline: 2px solid #1a56db; outline-offset: -1px; }
  table { border-collapse: collapse; width: 100%; }

  /* ── Mobile nav bottom bar ── */
  .mob-nav { display: none; }
  .desk-nav { display: flex; }
  .desk-add-btn { display: block; }

  @media (max-width: 768px) {
    /* Bottom tab bar */
    .mob-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: #111827; border-top: 1px solid rgba(255,255,255,0.08); z-index: 200; padding: 0; }
    .mob-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 2px 10px; cursor: pointer; border: none; background: none; color: #6b7280; font-size: 10px; font-family: 'DM Sans', system-ui, sans-serif; gap: 3px; position: relative; }
    .mob-nav-item.active { color: #fff; }
    .mob-nav-icon { font-size: 18px; line-height: 1; }
    .mob-nav-dot { position: absolute; top: 6px; right: calc(50% - 14px); width: 6px; height: 6px; border-radius: 50%; background: #f97316; }

    /* Hide desktop nav tabs, show only logo */
    .desk-nav { display: none; }
    .desk-add-btn { display: none; }

    /* Content padding accounts for bottom nav */
    .page-content { padding: 14px 14px 80px !important; }

    /* KPI grid: 2 cols on mobile */
    .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }

    /* Heatmap: scrollable on mobile */
    .heatmap-grid { grid-template-columns: repeat(12, minmax(44px, 1fr)) !important; overflow-x: auto !important; }

    /* Two-col grids become single col */
    .two-col { grid-template-columns: 1fr !important; }

    /* Cluster grid */
    .cluster-grid { grid-template-columns: 1fr !important; }

    /* Monthly planner: 1 col */
    .month-grid { grid-template-columns: 1fr !important; }

    /* Table: hide less important cols */
    .td-hide-mob { display: none !important; }
    .th-hide-mob { display: none !important; }

    /* Form grids: single col */
    .form-grid { grid-template-columns: 1fr !important; }

    /* Conf mode conference cards */
    .conf-pick-grid { grid-template-columns: 1fr !important; }

    /* Discover grid */
    .discover-grid { grid-template-columns: 1fr !important; }

    /* Larger tap targets on mobile */
    button { min-height: 36px; }

    /* Lead cards on mobile */
    .lead-actions { flex-wrap: wrap; }

    /* Stats on mobile */
    .stats-grid { grid-template-columns: repeat(2,1fr) !important; }

    /* Toast position above bottom nav */
    .toast-msg { bottom: 72px !important; top: auto !important; }
  }
</style>
</head>

const SK = "grain_conf_v5";
const LK = "grain_leads_v2";
const sc = s => s>=9?"#1a56db":s>=7?"#057a55":s>=5?"#c27803":"#9ca3af";
const sSt = {"Going":{bg:"#f0fdf4",color:"#166534",border:"#bbf7d0"},"TBD":{bg:"#fffbeb",color:"#92400e",border:"#fde68a"},"Not Going":{bg:"#f9fafb",color:"#6b7280",border:"#e5e7eb"}};
const pc = n => PCOLORS[TEAM.indexOf(n)%PCOLORS.length];
const ini = n => n.split(" ").map(x=>x[0]).join("");
function ld(key,def){ try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;} }
function sv(key,d){ try{localStorage.setItem(key,JSON.stringify(d));}catch(e){} }

const IS = {width:"100%",padding:"8px 10px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,color:"#111827",background:"#fff"};
const BS = (o={})=>({padding:"8px 16px",borderRadius:8,border:"none",background:"#111827",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",...o});

// ─── Shared components ────────────────────────────────────────────────────────
function Avatar({name,size=26}){ const c=pc(name); return <div title={name} style={{width:size,height:size,borderRadius:"50%",background:c+"22",border:`1.5px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.36,fontWeight:700,color:c,flexShrink:0}}>{ini(name)}</div>; }
function ScoreBar({score,w=44}){ return <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:w,height:4,borderRadius:2,background:"#f3f4f6",overflow:"hidden"}}><div style={{width:`${score*10}%`,height:"100%",background:sc(score),borderRadius:2}}/></div><span style={{fontSize:11,fontWeight:700,color:sc(score)}}>{score}</span></div>; }
function Badge({status}){ const s=sSt[status]||sSt["Not Going"]; return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{status}</span>; }
function Pill({label,active,onClick}){ return <button onClick={onClick} style={{padding:"4px 12px",borderRadius:20,fontSize:12,border:`1.5px solid ${active?"#111827":"#e5e7eb"}`,background:active?"#111827":"#fff",color:active?"#fff":"#6b7280",cursor:"pointer",fontWeight:active?600:400}}>{label}</button>; }
function Card({children,style={}}){ return <div style={{background:"#fff",borderRadius:12,border:"1px solid #ececec",...style}}>{children}</div>; }
function CardHead({title,sub,right}){ return <div style={{padding:"13px 18px",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:700,color:"#111827"}}>{title}</div>{sub&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{sub}</div>}</div>{right&&<div>{right}</div>}</div>; }

function Modal({title,onClose,children,maxW=580}){
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:maxW,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"#111827"}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",padding:"0 4px"}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function F({label,children}){ return <div style={{marginBottom:12}}><label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{label}</label>{children}</div>; }

// ─── Conference Form ──────────────────────────────────────────────────────────
function ConfForm({form,setForm,onSave,onCancel,title}){
  const tog=name=>setForm(f=>({...f,attendees:f.attendees.includes(name)?f.attendees.filter(a=>a!==name):[...f.attendees,name]}));
  return (
    <Modal title={title} onClose={onCancel}>
      <F label="Name"><input style={IS} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Conference name"/></F>
      <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <F label="Location"><input style={IS} value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="City, Country"/></F>
        <F label="Vertical"><select style={IS} value={form.vertical} onChange={e=>setForm(f=>({...f,vertical:e.target.value}))}>{VERTICALS.filter(v=>v!=="All").map(v=><option key={v}>{v}</option>)}</select></F>
        <F label="Month"><select style={IS} value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}>{MONTHS.map(m=><option key={m}>{m}</option>)}</select></F>
        <F label="Quarter"><select style={IS} value={form.quarter} onChange={e=>setForm(f=>({...f,quarter:Number(e.target.value)}))}>{[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}</select></F>
        <F label="Start"><input style={IS} value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} placeholder="e.g. 10-Jun-2026"/></F>
        <F label="End"><input style={IS} value={form.end} onChange={e=>setForm(f=>({...f,end:e.target.value}))} placeholder="e.g. 12-Jun-2026"/></F>
        <F label="Status"><select style={IS} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></F>
        <F label="Participation"><input style={IS} value={form.participation} onChange={e=>setForm(f=>({...f,participation:e.target.value}))} placeholder="Delegate / Exhibitor / Speaker"/></F>
        <F label="Est. attendees"><input style={IS} type="number" value={form.size||""} onChange={e=>setForm(f=>({...f,size:e.target.value}))} placeholder="e.g. 3000"/></F>
        <F label="ICP score (1–10)">
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input style={{...IS,width:64}} type="number" min={1} max={10} value={form.score} onChange={e=>setForm(f=>({...f,score:Number(e.target.value)}))}/>
            <div style={{flex:1,height:6,borderRadius:3,background:"#f3f4f6",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(Number(form.score)||0,10)*10}%`,background:sc(form.score),borderRadius:3}}/></div>
          </div>
        </F>
      </div>
      <F label="Attendees"><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:2}}>{TEAM.map(name=>{const on=form.attendees.includes(name);return <button key={name} onClick={()=>tog(name)} style={{padding:"4px 12px",borderRadius:20,fontSize:12,border:`1.5px solid ${on?pc(name):"#e5e7eb"}`,background:on?"#f0f4ff":"#fff",color:on?pc(name):"#6b7280",cursor:"pointer",fontWeight:on?600:400}}>{name.split(" ")[0]}</button>;})}</div></F>
      <F label="Notes"><textarea style={{...IS,height:60,resize:"vertical"}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Contacts, reminders..."/></F>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
        <button onClick={onCancel} style={BS({background:"#fff",color:"#374151",border:"1px solid #e5e7eb"})}>Cancel</button>
        <button onClick={onSave} style={BS()}>Save</button>
      </div>
    </Modal>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({all,leads,onEdit,vert,setVert}){
  const now=MONTHS[new Date().getMonth()]; const ni=new Date().getMonth();
  const confs=vert==="All"?all:all.filter(c=>c.vertical===vert);
  const going=confs.filter(c=>c.status==="Going");
  const thisM=confs.filter(c=>c.month===now&&c.status==="Going");
  const nextM=confs.filter(c=>c.month===MONTHS[(ni+1)%12]&&c.status==="Going");
  const tbd=confs.filter(c=>c.status==="TBD");
  const totalLeads=leads.length;

  const personStats=TEAM.map(name=>({name,year:going.filter(c=>c.attendees.includes(name)).length,month:thisM.filter(c=>c.attendees.includes(name)).length})).filter(p=>p.year>0).sort((a,b)=>b.year-a.year);

  const clusters=useMemo(()=>{
    const m={};
    going.forEach(c=>{const k=`${c.location}|||${c.month}`;if(!m[k])m[k]={location:c.location,month:c.month,confs:[]};m[k].confs.push(c);});
    return Object.values(m).filter(g=>g.confs.length>=2).sort((a,b)=>MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month));
  },[going]);

  const heat=MONTHS.map(m=>({month:m,g:confs.filter(c=>c.month===m&&c.status==="Going").length,t:confs.filter(c=>c.month===m&&c.status==="TBD").length}));
  const maxH=Math.max(...heat.map(h=>h.g+h.t),1);

  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:22,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,color:"#9ca3af",marginRight:2}}>Filter:</span>
        {VERTICALS.map(v=><Pill key={v} label={v} active={vert===v} onClick={()=>setVert(v)}/>)}
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"Confirmed this year",value:going.length,sub:"Going status"},
          {label:"This month — "+now,value:thisM.length,sub:"conferences going"},
          {label:"Next month — "+MONTHS[(ni+1)%12],value:nextM.length,sub:"coming up"},
          {label:"Awaiting decision",value:tbd.length,sub:"TBD — need action"},
          {label:"Total leads captured",value:totalLeads,sub:"across all conferences"},
        ].map(m=>(
          <Card key={m.label} style={{padding:"16px 18px"}}>
            <div style={{fontSize:11,color:"#9ca3af",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{m.label}</div>
            <div style={{fontSize:30,fontWeight:700,color:"#111827",lineHeight:1}}>{m.value}</div>
            <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{m.sub}</div>
          </Card>
        ))}
      </div>

      {/* Year heatmap */}
      <Card style={{padding:"16px 20px",marginBottom:18}}>
        <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:6}}>Coverage heatmap — 2026</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>Blue = confirmed going · Amber = TBD · Darker = more events</div>
        <div className="heatmap-grid" style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:6}}>
          {heat.map(h=>{
            const int=(h.g+h.t)/maxH; const isN=h.month===now;
            const hasPast=MONTHS.indexOf(h.month)<MONTHS.indexOf(now);
            return (
              <div key={h.month} style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:isN?"#1a56db":hasPast?"#d1d5db":"#9ca3af",fontWeight:isN?700:400,marginBottom:4}}>{h.month}</div>
                <div style={{height:52,borderRadius:8,background:h.g+h.t===0?"#f9fafb":`rgba(26,86,219,${0.08+int*0.72})`,border:isN?"2px solid #1a56db":hasPast?"1px solid #f0f0f0":"1px solid #e5e7eb",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,opacity:hasPast?0.5:1}}>
                  {h.g>0&&<div style={{fontSize:14,fontWeight:700,color:int>0.6?"#fff":"#1a56db"}}>{h.g}</div>}
                  {h.t>0&&<div style={{fontSize:10,color:int>0.6?"rgba(255,255,255,0.8)":"#c27803"}}>+{h.t} TBD</div>}
                  {h.g===0&&h.t===0&&<div style={{fontSize:10,color:"#d1d5db"}}>—</div>}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
        {/* This month */}
        <Card>
          <CardHead title={"Conferences this month"} sub={now+" 2026"} right={<span style={{fontSize:11,background:"#1a56db",color:"#fff",padding:"2px 8px",borderRadius:4,fontWeight:700}}>{thisM.length} events</span>}/>
          <div style={{padding:"8px 14px"}}>
            {thisM.length===0&&<div style={{fontSize:13,color:"#d1d5db",padding:"16px 0",textAlign:"center"}}>No confirmed events in {now}</div>}
            {thisM.map(c=>(
              <div key={c.id} onClick={()=>onEdit(c)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 4px",borderBottom:"1px solid #f9fafb",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>{c.location} · {c.vertical}</div>
                </div>
                <div style={{display:"flex",flexShrink:0}}>{c.attendees.slice(0,4).map((a,i)=><div key={a} style={{marginLeft:i?-6:0}}><Avatar name={a} size={24}/></div>)}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Team load */}
        <Card>
          <CardHead title="Team conference load" sub="Full year · confirmed going"/>
          <div style={{padding:"10px 18px"}}>
            {personStats.map(p=>{
              const c=pc(p.name); const pct=Math.round((p.year/Math.max(going.length,1))*100);
              return (
                <div key={p.name} style={{marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <Avatar name={p.name} size={28}/>
                      <div>
                        <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>{p.name}</span>
                        {p.month>0&&<span style={{marginLeft:6,fontSize:10,background:"#eff6ff",color:"#1a56db",border:"1px solid #bfdbfe",borderRadius:3,padding:"1px 5px",fontWeight:600}}>{p.month} this month</span>}
                      </div>
                    </div>
                    <span style={{fontSize:14,fontWeight:700,color:c}}>{p.year}</span>
                  </div>
                  <div style={{height:5,borderRadius:3,background:"#f3f4f6",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:3}}/></div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* Trip clusters */}
      {clusters.length>0&&(
        <Card style={{padding:"16px 20px",marginBottom:18}}>
          <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:3}}>Trip clusters</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>Multiple confirmed events in the same city — one trip covers all of them</div>
          <div className="cluster-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10}}>
            {clusters.map((cl,i)=>(
              <div key={i} style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>{cl.location}</span>
                  <span style={{fontSize:11,background:"#dcfce7",color:"#166534",padding:"2px 7px",borderRadius:4,fontWeight:600}}>{cl.month} · {cl.confs.length} events</span>
                </div>
                {cl.confs.map(c=>(
                  <div key={c.id} onClick={()=>onEdit(c)} style={{fontSize:12,color:"#374151",padding:"4px 0",borderBottom:"1px dashed #bbf7d0",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.color="#1a56db"} onMouseLeave={e=>e.currentTarget.style.color="#374151"}>
                    <span>{c.name}</span>
                    <ScoreBar score={c.score} w={32}/>
                  </div>
                ))}
                <div style={{marginTop:8,fontSize:11,color:"#6b7280"}}>
                  Team: {[...new Set(cl.confs.flatMap(c=>c.attendees))].map(a=>a.split(" ")[0]).join(", ")||"TBD"}
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Top ranked */}
      <Card>
        <CardHead title="Top conferences by ICP score" right={<span style={{fontSize:11,color:"#9ca3af"}}>Going + TBD</span>}/>
        {[...confs].filter(c=>c.status!=="Not Going").sort((a,b)=>b.score-a.score).slice(0,12).map((c,i)=>(
          <div key={c.id} onClick={()=>onEdit(c)} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 18px",borderBottom:"1px solid #f9fafb",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background=""}>
            <span style={{fontSize:12,color:"#d1d5db",width:18,textAlign:"right",flexShrink:0}}>{i+1}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:"#111827",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{c.location} · {c.month} · {c.vertical}</div>
            </div>
            <div style={{display:"flex",flexShrink:0}}>{c.attendees.slice(0,3).map((a,i)=><div key={a} style={{marginLeft:i?-6:0}}><Avatar name={a} size={22}/></div>)}</div>
            <Badge status={c.status}/>
            <ScoreBar score={c.score}/>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ─── ALL EVENTS ──────────────────────────────────────────────────────────────
function Events({all,onEdit,onDelete,onAdd,vert,setVert}){
  const [q,setQ]=useState("all"); const [s,setS]=useState("all"); const [search,setSearch]=useState("");
  const filtered=all.filter(c=>{
    if(q!=="all"&&String(c.quarter)!==q) return false;
    if(vert!=="All"&&c.vertical!==vert) return false;
    if(s!=="all"&&c.status!==s) return false;
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())&&!c.location.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{...IS,width:180}}/>
        <select style={{...IS,width:"auto"}} value={q} onChange={e=>setQ(e.target.value)}><option value="all">All quarters</option>{[1,2,3,4].map(n=><option key={n} value={n}>Q{n}</option>)}</select>
        <select style={{...IS,width:"auto"}} value={vert} onChange={e=>setVert(e.target.value)}>{VERTICALS.map(v=><option key={v}>{v}</option>)}</select>
        <select style={{...IS,width:"auto"}} value={s} onChange={e=>setS(e.target.value)}><option value="all">All statuses</option>{STATUSES.map(x=><option key={x}>{x}</option>)}</select>
        <span style={{fontSize:12,color:"#9ca3af",flex:1}}>{filtered.length} events</span>
        <button onClick={onAdd} style={BS()}>+ Add event</button>
      </div>
      <Card style={{overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #f0f0f0"}}>{[["Conference",""],["Location","td-hide-mob"],["Month","td-hide-mob"],["Vertical","td-hide-mob"],["Status",""],["Team","td-hide-mob"],["Score",""],["",""]].map(([h,cls])=><th key={h} className={cls} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map(c=>(
              <tr key={c.id} style={{borderBottom:"1px solid #f9fafb"}} onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                <td style={{padding:"10px 14px",fontWeight:600,color:"#111827",whiteSpace:"nowrap"}}>{c.name}</td>
                <td className="td-hide-mob" style={{padding:"10px 14px",color:"#6b7280",whiteSpace:"nowrap"}}>{c.location}</td>
                <td className="td-hide-mob" style={{padding:"10px 14px",color:"#6b7280",whiteSpace:"nowrap"}}>{c.month} Q{c.quarter}</td>
                <td className="td-hide-mob" style={{padding:"10px 14px",color:"#6b7280"}}>{c.vertical}</td>
                <td style={{padding:"10px 14px"}}><Badge status={c.status}/></td>
                <td className="td-hide-mob" style={{padding:"10px 14px"}}><div style={{display:"flex",gap:2}}>{c.attendees.slice(0,4).map(a=><Avatar key={a} name={a} size={24}/>)}{c.attendees.length>4&&<span style={{fontSize:10,color:"#9ca3af",alignSelf:"center",marginLeft:2}}>+{c.attendees.length-4}</span>}</div></td>
                <td style={{padding:"10px 14px"}}><ScoreBar score={c.score}/></td>
                <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:4}}><button onClick={()=>onEdit(c)} style={{padding:"4px 10px",border:"1px solid #e5e7eb",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#374151"}}>Edit</button><button onClick={()=>onDelete(c.id)} style={{padding:"4px 8px",border:"1px solid #fee2e2",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#ef4444"}}>×</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── MONTHLY PLANNER ─────────────────────────────────────────────────────────
function Planner({all,onEdit,vert,setVert}){
  const now=MONTHS[new Date().getMonth()];
  const confs=vert==="All"?all:all.filter(c=>c.vertical===vert);
  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,color:"#9ca3af",marginRight:2}}>Vertical:</span>
        {VERTICALS.map(v=><Pill key={v} label={v} active={vert===v} onClick={()=>setVert(v)}/>)}
      </div>
      <div className="month-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        {MONTHS.map(month=>{
          const mcs=confs.filter(c=>c.month===month&&c.status!=="Not Going"); const isN=month===now;
          return (
            <Card key={month} style={{border:`1.5px solid ${isN?"#1a56db":"#ececec"}`}}>
              <div style={{padding:"11px 16px",background:isN?"#eff6ff":"#f9fafb",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:14,fontWeight:700,color:isN?"#1a56db":"#111827"}}>{month} 2026</span>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>{isN&&<span style={{fontSize:10,background:"#1a56db",color:"#fff",padding:"2px 7px",borderRadius:4,fontWeight:700}}>NOW</span>}<span style={{fontSize:11,color:"#9ca3af"}}>{mcs.length}</span></div>
              </div>
              <div style={{padding:"10px 14px"}}>
                {mcs.length===0&&<div style={{fontSize:12,color:"#d1d5db",padding:"6px 0"}}>No events — use Discover</div>}
                {mcs.map(c=>(
                  <div key={c.id} onClick={()=>onEdit(c)} style={{marginBottom:9,paddingBottom:9,borderBottom:"1px solid #f9fafb",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <span style={{fontSize:13,fontWeight:600,color:"#111827",lineHeight:1.3,flex:1,marginRight:6}}>{c.name}</span>
                      <span style={{fontSize:11,fontWeight:700,color:sc(c.score),flexShrink:0}}>{c.score}/10</span>
                    </div>
                    <div style={{fontSize:11,color:"#9ca3af",marginTop:2,marginBottom:5}}>{c.location} · {c.vertical}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:2}}>{c.attendees.slice(0,4).map((a,i)=><div key={a} style={{marginLeft:i?-5:0}}><Avatar name={a} size={20}/></div>)}</div>
                      <Badge status={c.status}/>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── CONFERENCE MODE (mobile-friendly lead capture) ──────────────────────────
function ConferenceMode({all,leads,setLeads,toast2}){
  const going=all.filter(c=>c.status==="Going");
  const [selConf,setSelConf]=useState(null);
  const [showLead,setShowLead]=useState(false);
  const [editingLead,setEditingLead]=useState(null);
  const blank={firstName:"",lastName:"",company:"",role:"",email:"",phone:"",warmth:"Warm",notes:"",followUp:"",confId:null,syncedToHS:false,hsContactId:null};
  const [leadForm,setLeadForm]=useState(blank);
  const [editForm,setEditForm]=useState(null);
  const [syncing,setSyncing]=useState({});
  const [filterW,setFilterW]=useState("all");
  const [search,setSearch]=useState("");

  const allConfLeads=selConf?leads.filter(l=>l.confId===selConf.id):[];
  const confLeads=allConfLeads.filter(l=>{
    if(filterW!=="all"&&l.warmth!==filterW) return false;
    if(search&&![l.firstName,l.lastName,l.company,l.role,l.email].filter(Boolean).some(x=>x.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  const saveLead=()=>{
    if(!leadForm.firstName&&!leadForm.company){alert("Name or company required.");return;}
    const newLead={...leadForm,id:Date.now(),confId:selConf.id,confName:selConf.name,capturedAt:new Date().toISOString(),syncedToHS:false,hsContactId:null};
    setLeads(p=>[...p,newLead]);
    setLeadForm({...blank,confId:selConf.id});
    setShowLead(false);
    toast2("Lead saved!");
  };

  const saveEdit=()=>{
    setLeads(p=>p.map(l=>l.id===editingLead?{...editForm}:l));
    setEditingLead(null); setEditForm(null);
    toast2("Lead updated!");
  };

  const exportCSV=()=>{
    const rows=[["First Name","Last Name","Company","Role","Email","Phone","Warmth","Follow-up","Notes","Conference","Captured At","Synced to HubSpot"]];
    allConfLeads.forEach(l=>rows.push([l.firstName||"",l.lastName||"",l.company||"",l.role||"",l.email||"",l.phone||"",l.warmth||"",l.followUp||"",l.notes||"",l.confName||"",l.capturedAt?new Date(l.capturedAt).toLocaleDateString():"",l.syncedToHS?"Yes":"No"]));
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`leads-${selConf.name.replace(/\s+/g,"-")}.csv`; a.click();
    toast2("CSV downloaded!");
  };

  const exportExcel=()=>{
    const rows=[["First Name","Last Name","Company","Role","Email","Phone","Warmth","Follow-up","Notes","Conference","Captured At","Synced to HubSpot"]];
    allConfLeads.forEach(l=>rows.push([l.firstName||"",l.lastName||"",l.company||"",l.role||"",l.email||"",l.phone||"",l.warmth||"",l.followUp||"",l.notes||"",l.confName||"",l.capturedAt?new Date(l.capturedAt).toLocaleDateString():"",l.syncedToHS?"Yes":"No"]));
    let xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Leads"><Table>`;
    rows.forEach(r=>{xml+=`<Row>`;r.forEach(v=>{xml+=`<Cell><Data ss:Type="String">${String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</Data></Cell>`;});xml+=`</Row>`;});
    xml+=`</Table></Worksheet></Workbook>`;
    const a=document.createElement("a"); a.href="data:application/vnd.ms-excel;charset=utf-8,"+encodeURIComponent(xml);
    a.download=`leads-${selConf.name.replace(/\s+/g,"-")}.xls`; a.click();
    toast2("Excel downloaded!");
  };

  const syncToHubSpot=async(lead)=>{
    if(!HUBSPOT_API_KEY){alert("Add your HubSpot API key to the file (const HUBSPOT_API_KEY).");return;}
    setSyncing(s=>({...s,[lead.id]:true}));
    try {
      // Create/update contact
      const contactPayload={properties:{firstname:lead.firstName,lastname:lead.lastName,email:lead.email,phone:lead.phone,jobtitle:lead.role,company:lead.company,hs_lead_status:"NEW"}};
      const cRes=await fetch("https://api.hubspot.com/crm/v3/objects/contacts",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify(contactPayload)});
      const cData=await cRes.json();
      const contactId=cData.id;

      // Create company if provided
      let companyId=null;
      if(lead.company){
        const coRes=await fetch("https://api.hubspot.com/crm/v3/objects/companies",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify({properties:{name:lead.company}})});
        const coData=await coRes.json(); companyId=coData.id;
        // Associate contact to company
        if(contactId&&companyId){
          await fetch(`https://api.hubspot.com/crm/v3/objects/contacts/${contactId}/associations/companies/${companyId}/contact_to_company`,{method:"PUT",headers:{"Authorization":`Bearer ${HUBSPOT_API_KEY}`}});
        }
      }

      // Add note
      const noteBody=`Met at: ${lead.confName}\nWarmth: ${lead.warmth}\nRole: ${lead.role||"N/A"}\nNotes: ${lead.notes||"None"}\n\nCaptured via Grain Conference Intelligence`;
      const nRes=await fetch("https://api.hubspot.com/crm/v3/objects/notes",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify({properties:{hs_note_body:noteBody,hs_timestamp:new Date().getTime()}})});
      const nData=await nRes.json();
      if(contactId&&nData.id){

// ─── ALL LEADS view ───────────────────────────────────────────────────────────
function AllLeads({all,leads,setLeads,toast2}){
  const [search,setSearch]=useState("");
  const [filterW,setFilterW]=useState("all");
  const [syncing,setSyncing]=useState({});

  const filtered=leads.filter(l=>{
    if(filterW!=="all"&&l.warmth!==filterW) return false;
    if(search&&![l.firstName,l.lastName,l.company,l.email,l.confName].filter(Boolean).some(x=>x.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  const syncToHubSpot=async(lead)=>{
    if(!HUBSPOT_API_KEY){alert("Add your HubSpot API key to the file.");return;}
    setSyncing(s=>({...s,[lead.id]:true}));
    try{
      const cRes=await fetch("https://api.hubspot.com/crm/v3/objects/contacts",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify({properties:{firstname:lead.firstName,lastname:lead.lastName,email:lead.email,phone:lead.phone,jobtitle:lead.role,company:lead.company}})});
      const cData=await cRes.json();
      if(lead.company){
        const coRes=await fetch("https://api.hubspot.com/crm/v3/objects/companies",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify({properties:{name:lead.company}})});
        const coData=await coRes.json();
        if(cData.id&&coData.id) await fetch(`https://api.hubspot.com/crm/v3/objects/contacts/${cData.id}/associations/companies/${coData.id}/contact_to_contact`,{method:"PUT",headers:{"Authorization":`Bearer ${HUBSPOT_API_KEY}`}});
      }
      const noteBody=`Met at: ${lead.confName}\nWarmth: ${lead.warmth}\nNotes: ${lead.notes||"None"}\n\nCaptu via Grain Conference Intelligence`;
      const nRes=await fetch("https://api.hubspot.com/crm/v3/objects/notes",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${HUBSPOT_API_KEY}`},body:JSON.stringify({properties:{hs_note_body:noteBody,hs_timestamp:new Date().getTime()}})});
      const nData=await nRes.json();
      if(cData.id&&nData.id) await fetch(`https://api.hubspot.com/crm/v3/objects/notes/${nData.id}/associations/contacts/${cData.id}/note_to_contact`,{method:"PUT",headers:{"Authorization":`Bearer ${HUBSPOT_API_KEY}`}});
      setLeads(p=>p.map(l=>l.id===lead.id?{...l,syncedToHS:true,hsContactId:cData.id}:l));
      toast2("Synced!");
    }catch(e){alert("Sync failed: "+e.message);}
    setSyncing(s=>({...s,[lead.id]:false}));
  };

  const syncAll=async()=>{
    const unsynced=filtered.filter(l=>!l.syncedToHS);
    if(!unsynced.length){toast2("All leads already synced!");return;}
    for(const l of unsynced) await syncToHubSpot(l);
    toast2(`${unsynced.length} leads synced!`);
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search leads..." style={{...IS,width:200}}/>
        <select style={{...IS,width:"auto"}} value={filterW} onChange={e=>setFilterW(e.target.value)}>
          <option value="all">All warmth</option>{["Hot","Warm","Cold"].map(w=><option key={w}>{w}</option>)}
        </select>
        <span style={{fontSize:12,color:"#9ca3af",flex:1}}>{filtered.length} leads</span>
        {!HUBSPOT_API_KEY&&<span style={{fontSize:11,color:"#c27803",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:6,padding:"4px 10px"}}>⚠ Add HubSpot key to enable sync</span>}
        <button onClick={syncAll} style={BS({background:"#f97316"})}>Sync all to HubSpot →</button>
      </div>
      <Card style={{overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #f0f0f0"}}>{["Name","Company","Role","Email","Conference","Warmth","Captured by","HubSpot",""].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={9} style={{padding:"32px",textAlign:"center",color:"#9ca3af",fontSize:13}}>No leads yet. Use Conference Mode to capture leads at events.</td></tr>}
            {filtered.map(lead=>{
              const wc=WARM_COLORS[lead.warmth]||WARM_COLORS.Warm;
              return (
                <tr key={lead.id} style={{borderBottom:"1px solid #f9fafb"}} onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{padding:"10px 14px",fontWeight:600,color:"#111827",whiteSpace:"nowrap"}}>{lead.firstName} {lead.lastName}</td>
                  <td style={{padding:"10px 14px",color:"#374151"}}>{lead.company||"—"}</td>
                  <td style={{padding:"10px 14px",color:"#6b7280",whiteSpace:"nowrap"}}>{lead.role||"—"}</td>
                  <td style={{padding:"10px 14px",color:"#6b7280",fontSize:12}}>{lead.email||"—"}</td>
                  <td style={{padding:"10px 14px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{lead.confName}</td>
                  <td style={{padding:"10px 14px"}}><span style={{background:wc.bg,color:wc.color,border:`1px solid ${wc.border}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600}}>{lead.warmth}</span></td>
                  <td style={{padding:"10px 14px",color:"#6b7280",fontSize:12}}>{lead.capturedBy?lead.capturedBy.split(" ")[0]:"—"}</td>
                  <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                    {lead.syncedToHS
                      ?<span style={{fontSize:11,color:"#057a55",fontWeight:600}}>✓ Synced</span>
                      :<button onClick={()=>syncToHubSpot(lead)} disabled={syncing[lead.id]} style={BS({fontSize:11,padding:"4px 10px",background:"#f97316",opacity:syncing[lead.id]?0.6:1})}>{syncing[lead.id]?"...":"Sync"}</button>
                    }
                  </td>
                  <td style={{padding:"10px 14px"}}><button onClick={()=>setLeads(p=>p.filter(l=>l.id!==lead.id))} style={{padding:"4px 8px",border:"1px solid #fee2e2",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#ef4444"}}>×</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── DISCOVER ────────────────────────────────────────────────────────────────
function Discover({all,onAdd}){
  const [month,setMonth]=useState(""); const [vert,setVert]=useState("PSP");
  const [loading,setLoading]=useState(false); const [results,setResults]=useState([]); const [error,setError]=useState("");

  const find=async()=>{
    if(!month){setError("Select a month first.");return;}
    setLoading(true);setResults([]);setError("");
    const existing=all.map(c=>c.name).join(", ");
    const focus=vert==="All"?"fintech, payments, FX, cross-border":vert==="PSP"?"PSPs, payment processors, acquirers, money movers":vert==="Travel"?"travel companies with FX exposure — OTAs, airlines, hotel chains":vert==="Treasury"?"treasury professionals, CFOs managing FX":vert;
    const prompt=`You are a B2B conference researcher for Grain, a fintech that helps PSPs, cross-border payment companies, and FX-exposed businesses manage currency risk.\n\nFind 6-8 industry conferences in ${month} 2026 focused on: ${focus}. Do not suggest: ${existing}\n\nFor each: name, location, approximate dates, why relevant for Grain (PSP/FX/cross-border angle), estimated attendees, ICP score out of 10, recommended action.\n\nRespond ONLY with valid JSON array, no markdown:\n[{"name":"...","location":"...","dates":"...","why":"...","size":"...","score":8,"action":"..."}]`;
    try{
      const h={"Content-Type":"application/json"};
      if(ANTHROPIC_API_KEY){h["x-api-key"]=ANTHROPIC_API_KEY;h["anthropic-version"]="2023-06-01";}
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:h,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(data.error){setError("API error: "+data.error.message);setLoading(false);return;}
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      setResults(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setError("Something went wrong — check your Anthropic API key is set in the file.");}
    setLoading(false);
  };

  const addIt=r=>{
    const mo=MONTHS.find(m=>r.dates?.includes(m))||month;
    onAdd({id:Date.now(),name:r.name,location:r.location,quarter:Math.ceil((MONTHS.indexOf(mo)+1)/3)||2,month:mo,vertical:vert==="All"?"PSP":vert,status:"TBD",attendees:[],participation:"Delegate",start:r.dates||"",end:"",size:parseInt((r.size||"").replace(/[^0-9]/g,""))||null,score:Number(r.score)||7,notes:r.why||""});
  };

  return (
    <div>
      <Card style={{padding:"22px 24px",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:4}}>AI Conference Discovery</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:18,lineHeight:1.6}}>Pick a month and vertical. Claude finds conferences you're not tracking yet and scores them for Grain's ICP.</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{...IS,width:"auto"}}><option value="">Select month...</option>{MONTHS.map(m=><option key={m} value={m}>{m} 2026</option>)}</select>
          <select value={vert} onChange={e=>setVert(e.target.value)} style={{...IS,width:"auto"}}>{VERTICALS.map(v=><option key={v}>{v}</option>)}</select>
          <button onClick={find} disabled={loading} style={{...BS(),opacity:loading?0.6:1,cursor:loading?"not-allowed":"pointer"}}>{loading?"Searching...":"Find conferences →"}</button>
        </div>
        {!ANTHROPIC_API_KEY&&<div style={{marginTop:12,padding:"10px 14px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,fontSize:12,color:"#92400e"}}>⚠ Add your Anthropic API key: open index.html, find <code style={{background:"#fef3c7",padding:"1px 4px",borderRadius:3}}>const ANTHROPIC_API_KEY=""</code> and paste your key from console.anthropic.com</div>}
        {error&&<div style={{fontSize:12,color:"#ef4444",marginTop:10}}>{error}</div>}
      </Card>
      {loading&&<Card style={{padding:40,textAlign:"center"}}><div style={{color:"#9ca3af",fontSize:13}}>Searching for {vert} conferences in {month} 2026...</div></Card>}
      {results.length>0&&(
        <>
          <div style={{fontSize:13,fontWeight:600,color:"#111827",marginBottom:12}}>{results.length} conferences found for {month} 2026</div>
          <div className="discover-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
            {results.map((r,i)=>{
              const s=Number(r.score)||7; const already=all.some(c=>c.name.toLowerCase()===r.name.toLowerCase());
              return (
                <Card key={i} style={{padding:"16px 18px",borderTop:`3px solid ${sc(s)}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#111827",lineHeight:1.3,flex:1,marginRight:8}}>{r.name}</div>
                    <span style={{fontSize:12,fontWeight:700,color:sc(s),flexShrink:0}}>{r.score}/10</span>
                  </div>
                  <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>{r.location} · {r.dates}</div>
                  <div style={{fontSize:12,color:"#374151",lineHeight:1.55,marginBottom:12}}>{r.why}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,background:"#f3f4f6",color:"#6b7280",padding:"2px 8px",borderRadius:4}}>{r.action}</span>
                    {already?<span style={{fontSize:11,color:"#9ca3af"}}>Already tracked</span>:<button onClick={()=>addIt(r)} style={BS({fontSize:11,padding:"5px 12px"})}>+ Add</button>}
                  </div>
                </Card>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [all,setAll]=useState(()=>ld(SK,INITIAL));
  const [leads,setLeads]=useState(()=>ld(LK,[]));
  const [tab,setTab]=useState("confmode");
  const [vert,setVert]=useState("All");
  const [editC,setEditC]=useState(null); const [showAdd,setShowAdd]=useState(false);
  const [toast,setToast]=useState("");
  const blank={name:"",location:"",quarter:1,month:"Jan",vertical:"PSP",status:"TBD",attendees:[],participation:"",start:"",end:"",size:"",score:7,notes:""};
  const [newF,setNewF]=useState(blank); const [editF,setEditF]=useState(null);

  useEffect(()=>sv(SK,all),[all]);
  useEffect(()=>sv(LK,leads),[leads]);

  const toast2=msg=>{setToast(msg);setTimeout(()=>setToast(""),2400);};
  const startEdit=c=>{setEditC(c);setEditF({...c,attendees:[...c.attendees]});};
  const saveEdit=()=>{setAll(p=>p.map(c=>c.id===editC.id?{...editF,size:editF.size===""?null:Number(editF.size),score:Number(editF.score)}:c));setEditC(null);setEditF(null);toast2("Saved!");};
  const addC=()=>{setAll(p=>[...p,{...newF,id:Date.now(),size:newF.size===""?null:Number(newF.size),score:Number(newF.score),attendees:[...newF.attendees]}]);setShowAdd(false);setNewF(blank);toast2("Added!");};
  const delC=id=>{if(window.confirm("Delete?")){setAll(p=>p.filter(c=>c.id!==id));toast2("Deleted.");}};

  const unsynced=leads.filter(l=>!l.syncedToHS).length;
  const props={all,vert,setVert};

  // Desktop tabs
  const DTABS=[["dashboard","Dashboard"],["events","All Events"],["planner","Monthly Planner"],["confmode","Conference Mode"],["leads","All Leads"],["discover","Discover"]];

  // Mobile bottom nav — 5 key items with icons
  const MTABS=[
    ["confmode","Field","📋"],
    ["dashboard","Dashboard","📊"],
    ["leads","Leads","👥"],
    ["planner","Planner","📅"],
    ["discover","Discover","🔍"],
  ];

  return (
    <div style={{minHeight:"100vh",background:"#f4f5f7"}}>

      {/* ── Desktop top nav ── */}
      <div style={{background:"#111827",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:24}}>
          <div style={{padding:"13px 0"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#fff",letterSpacing:"-0.01em"}}>Grain</div>
            <div style={{fontSize:10,color:"#6b7280",marginTop:1,letterSpacing:"0.04em",textTransform:"uppercase"}}>Conference Intelligence</div>
          </div>
          <div className="desk-nav" style={{gap:1,flexWrap:"wrap"}}>
            {DTABS.map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 12px",borderRadius:7,border:"none",background:tab===id?"rgba(255,255,255,0.13)":"transparent",color:tab===id?"#fff":"#9ca3af",fontSize:12,fontWeight:tab===id?600:400,cursor:"pointer",position:"relative"}}>
                {label}
                {id==="leads"&&unsynced>0&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#f97316"}}/>}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button className="desk-add-btn" onClick={()=>setShowAdd(true)} style={BS({background:"#1a56db",padding:"6px 14px",fontSize:12})}>+ Add event</button>
        </div>
      </div>

      {/* ── Toast ── */}
      {toast&&<div className="toast-msg" style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",background:"#111827",color:"#34d399",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:500,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* ── Page content ── */}
      <div className="page-content" style={{padding:"22px 24px",maxWidth:1340,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard {...props} leads={leads} onEdit={startEdit}/>}
        {tab==="events"&&<Events {...props} onEdit={startEdit} onDelete={delC} onAdd={()=>setShowAdd(true)}/>}
        {tab==="planner"&&<Planner {...props} onEdit={startEdit}/>}
        {tab==="confmode"&&<ConferenceMode all={all} leads={leads} setLeads={setLeads} toast2={toast2}/>}
        {tab==="leads"&&<AllLeads all={all} leads={leads} setLeads={setLeads} toast2={toast2}/>}
        {tab==="discover"&&<Discover all={all} onAdd={c=>{setAll(p=>[...p,c]);toast2(c.name+" added!");}}/>}
      </div>

      {/* ── Mobile bottom nav ── */}
      <nav className="mob-nav">
        {MTABS.map(([id,label,icon])=>(
          <button key={id} className={`mob-nav-item${tab===id?" active":""}`} onClick={()=>setTab(id)}>
            <span className="mob-nav-icon">{icon}</span>
            <span>{label}</span>
            {id==="leads"&&unsynced>0&&<span className="mob-nav-dot"/>}
          </button>
        ))}
      </nav>

      {editC&&editF&&<ConfForm form={editF} setForm={setEditF} onSave={saveEdit} onCancel={()=>{setEditC(null);setEditF(null);}} title={`Edit — ${editC.name}`}/>}
      {showAdd&&<ConfForm form={newF} setForm={setNewF} onSave={addC} onCancel={()=>{setShowAdd(false);setNewF(blank);}} title="Add new conference"/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
