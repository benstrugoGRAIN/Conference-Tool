const sc = s => s>=9?"#1a56db":s>=7?"#057a55":s>=5?"#c27803":"#9ca3af";
const tierOf = s => s>=9?1:s>=7?2:s>=5?3:4;
const tierLabel = {1:"Must-attend",2:"High value",3:"Selective",4:"Monitor"};
const tierColor = {1:"#1a56db",2:"#057a55",3:"#c27803",4:"#9ca3af"};
const statusSt = {
  "Going":     {bg:"#f0fdf4",color:"#166534",border:"#bbf7d0"},
  "TBD":       {bg:"#fffbeb",color:"#92400e",border:"#fde68a"},
  "Not Going": {bg:"#f9fafb",color:"#6b7280",border:"#e5e7eb"},
};

const STORAGE_KEY = "grain_conf_v3";

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : INITIAL; } catch(e) { return INITIAL; }
}
function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

const inp = {width:"100%",padding:"8px 10px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,color:"#111827",background:"#fff"};
const sel = {...inp};
const btn = (extra={}) => ({padding:"8px 16px",borderRadius:8,border:"none",background:"#111827",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",...extra});

function Modal({title, onClose, children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:580,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"#111827"}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label, children}) {
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{label}</label>
      {children}
    </div>
  );
}

function ConferenceForm({form, setForm, onSave, onCancel, title}) {
  const toggle = name => setForm(f => ({...f, attendees: f.attendees.includes(name) ? f.attendees.filter(a=>a!==name) : [...f.attendees,name]}));
  return (
    <Modal title={title} onClose={onCancel}>
      <Field label="Conference name"><input style={inp} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Money 20/20 Europe"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Location"><input style={inp} value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="City, Country"/></Field>
        <Field label="Vertical">
          <select style={sel} value={form.vertical} onChange={e=>setForm(f=>({...f,vertical:e.target.value}))}>
            {VERTICALS.map(v=><option key={v}>{v}</option>)}
          </select>
        </Field>
        <Field label="Month">
          <select style={sel} value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}>
            {MONTHS.map(m=><option key={m}>{m}</option>)}
          </select>
        </Field>
        <Field label="Quarter">
          <select style={sel} value={form.quarter} onChange={e=>setForm(f=>({...f,quarter:Number(e.target.value)}))}>
            {[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}
          </select>
        </Field>
        <Field label="Start date"><input style={inp} value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} placeholder="e.g. 10-Jun-2026"/></Field>
        <Field label="End date"><input style={inp} value={form.end} onChange={e=>setForm(f=>({...f,end:e.target.value}))} placeholder="e.g. 12-Jun-2026"/></Field>
        <Field label="Status">
          <select style={sel} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="Participation"><input style={inp} value={form.participation} onChange={e=>setForm(f=>({...f,participation:e.target.value}))} placeholder="Delegate / Exhibitor / Speaker"/></Field>
        <Field label="Est. attendees"><input style={inp} type="number" value={form.size||""} onChange={e=>setForm(f=>({...f,size:e.target.value}))} placeholder="e.g. 3000"/></Field>
        <Field label="ICP score (1–10)">
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input style={{...inp,width:64}} type="number" min={1} max={10} value={form.score} onChange={e=>setForm(f=>({...f,score:Number(e.target.value)}))}/>
            <div style={{flex:1,height:6,borderRadius:3,background:"#f3f4f6",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(form.score,10)*10}%`,background:sc(form.score),borderRadius:3,transition:"width 0.2s"}}/>
            </div>
          </div>
        </Field>
      </div>
      <Field label="Attendees">
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:2}}>
          {TEAM.map(name => {
            const on = form.attendees.includes(name);
            return <button key={name} onClick={()=>toggle(name)} style={{padding:"4px 12px",borderRadius:20,fontSize:12,border:`1.5px solid ${on?"#1a56db":"#e5e7eb"}`,background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#6b7280",cursor:"pointer",fontWeight:on?600:400}}>{name.split(" ")[0]}</button>;
          })}
        </div>
      </Field>
      <Field label="Notes"><textarea style={{...inp,height:64,resize:"vertical"}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Contacts, reminders, strategy notes..."/></Field>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
        <button onClick={onCancel} style={{...btn({background:"#fff",color:"#374151",border:"1px solid #e5e7eb"})}}> Cancel</button>
        <button onClick={onSave} style={btn()}>Save changes</button>
      </div>
    </Modal>
  );
}

function Dashboard({conferences, onEdit}) {
  const going = conferences.filter(c=>c.status==="Going");
  const t1 = conferences.filter(c=>tierOf(c.score)===1);
  const psp = conferences.filter(c=>c.vertical==="PSP");
  const now = MONTHS[new Date().getMonth()];
  const upcoming = conferences.filter(c=>c.month===now && c.status!=="Not Going");

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
        {[
          {label:"Total tracked",value:conferences.length,sub:"conferences this year"},
          {label:"Confirmed going",value:going.length,sub:`${Math.round(going.length/conferences.length*100)}% of pipeline`},
          {label:"PSP / payments",value:psp.length,sub:"core ICP vertical"},
          {label:"Tier 1 events",value:t1.length,sub:"score 9–10, must-attend"},
        ].map(m=>(
          <div key={m.label} style={{background:"#fff",borderRadius:12,padding:"16px 18px",border:"1px solid #f0f0f0"}}>
            <div style={{fontSize:11,color:"#9ca3af",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{m.label}</div>
            <div style={{fontSize:30,fontWeight:700,color:"#111827",lineHeight:1}}>{m.value}</div>
            <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{m.sub}</div>
          </div>
        ))}
      </div>

      {upcoming.length > 0 && (
        <div style={{background:"#eff6ff",borderRadius:12,padding:"14px 18px",marginBottom:24,border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1e40af",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>This month ({now} 2026)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {upcoming.map(c=>(
              <div key={c.id} onClick={()=>onEdit(c)} style={{background:"#fff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>
                <span style={{fontSize:13,fontWeight:600,color:"#111827"}}>{c.name}</span>
                <span style={{fontSize:12,color:"#6b7280",marginLeft:6}}>{c.location}</span>
                <span style={{display:"inline-block",marginLeft:8,background:statusSt[c.status].bg,color:statusSt[c.status].color,border:`1px solid ${statusSt[c.status].border}`,borderRadius:4,padding:"1px 7px",fontSize:11}}>{c.status}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {[1,2,3,4].map(tier=>{
        const tcs = conferences.filter(c=>tierOf(c.score)===tier && c.status!=="Not Going");
        if(!tcs.length) return null;
        return (
          <div key={tier} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:tierColor[tier]}}/>
              <span style={{fontSize:13,fontWeight:700,color:"#111827"}}>Tier {tier} — {tierLabel[tier]}</span>
              <span style={{fontSize:12,color:"#9ca3af"}}>{tcs.length} events</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:8}}>
              {tcs.map(c=>(
                <div key={c.id} onClick={()=>onEdit(c)} style={{background:"#fff",borderRadius:10,padding:"12px 14px",border:"1px solid #f0f0f0",borderTop:`3px solid ${tierColor[tier]}`,cursor:"pointer",transition:"box-shadow 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  <div style={{fontSize:13,fontWeight:600,color:"#111827",marginBottom:2,lineHeight:1.3}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:8}}>{c.location} · {c.month} · Q{c.quarter}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,background:statusSt[c.status]?.bg,color:statusSt[c.status]?.color,border:`1px solid ${statusSt[c.status]?.border}`,borderRadius:4,padding:"2px 7px"}}>{c.status}</span>
                    <span style={{fontSize:12,fontWeight:700,color:tierColor[tier]}}>{c.score}/10</span>
                  </div>
                  {c.attendees.length>0 && <div style={{fontSize:11,color:"#9ca3af",marginTop:6}}>{c.attendees.map(a=>a.split(" ")[0]).join(", ")}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Events({conferences, onEdit, onDelete, onAdd}) {
  const [q, setQ] = useState("all");
  const [v, setV] = useState("all");
  const [s, setS] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = conferences.filter(c => {
    if(q!=="all" && String(c.quarter)!==q) return false;
    if(v!=="all" && c.vertical!==v) return false;
    if(s!=="all" && c.status!==s) return false;
    if(search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.location.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{...inp,width:180}}/>
        <select style={{...sel,width:"auto"}} value={q} onChange={e=>setQ(e.target.value)}>
          <option value="all">All quarters</option>
          {[1,2,3,4].map(n=><option key={n} value={n}>Q{n}</option>)}
        </select>
        <select style={{...sel,width:"auto"}} value={v} onChange={e=>setV(e.target.value)}>
          <option value="all">All verticals</option>
          {VERTICALS.map(x=><option key={x}>{x}</option>)}
        </select>
        <select style={{...sel,width:"auto"}} value={s} onChange={e=>setS(e.target.value)}>
          <option value="all">All statuses</option>
          {STATUSES.map(x=><option key={x}>{x}</option>)}
        </select>
        <span style={{fontSize:12,color:"#9ca3af",flex:1}}>{filtered.length} events</span>
        <button onClick={onAdd} style={btn()}>+ Add event</button>
      </div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #f0f0f0",overflow:"auto"}}>
        <table>
          <thead>
            <tr style={{background:"#f9fafb",borderBottom:"1px solid #f0f0f0"}}>
              {["Conference","Location","Month","Vertical","Status","Attendees","Score",""].map(h=>(
                <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(c=>(
              <tr key={c.id} style={{borderBottom:"1px solid #f9fafb"}}
                onMouseEnter={e=>e.currentTarget.style.background="#fafafa"}
                onMouseLeave={e=>e.currentTarget.style.background=""}>
                <td style={{padding:"10px 14px",fontWeight:600,color:"#111827",whiteSpace:"nowrap"}}>{c.name}</td>
                <td style={{padding:"10px 14px",color:"#6b7280",whiteSpace:"nowrap"}}>{c.location}</td>
                <td style={{padding:"10px 14px",color:"#6b7280",whiteSpace:"nowrap"}}>{c.month} Q{c.quarter}</td>
                <td style={{padding:"10px 14px",color:"#6b7280"}}>{c.vertical}</td>
                <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                  <span style={{background:statusSt[c.status]?.bg,color:statusSt[c.status]?.color,border:`1px solid ${statusSt[c.status]?.border}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:500}}>{c.status}</span>
                </td>
                <td style={{padding:"10px 14px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{c.attendees.length?c.attendees.map(a=>a.split(" ")[0]).join(", "):"—"}</td>
                <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:44,height:4,borderRadius:2,background:"#f3f4f6",overflow:"hidden"}}>
                      <div style={{width:`${c.score*10}%`,height:"100%",background:sc(c.score),borderRadius:2}}/>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:sc(c.score)}}>{c.score}</span>
                  </div>
                </td>
                <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>onEdit(c)} style={{padding:"4px 10px",border:"1px solid #e5e7eb",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#374151"}}>Edit</button>
                    <button onClick={()=>onDelete(c.id)} style={{padding:"4px 8px",border:"1px solid #fee2e2",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#ef4444"}}>×</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Planner({conferences, onEdit}) {
  const now = MONTHS[new Date().getMonth()];
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
      {MONTHS.map(month=>{
        const mcs = conferences.filter(c=>c.month===month && c.status!=="Not Going");
        const isNow = month===now;
        return (
          <div key={month} style={{background:"#fff",borderRadius:12,border:`1.5px solid ${isNow?"#1a56db":"#f0f0f0"}`,overflow:"hidden"}}>
            <div style={{padding:"11px 16px",background:isNow?"#eff6ff":"#f9fafb",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:700,color:isNow?"#1a56db":"#111827"}}>{month} 2026</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {isNow && <span style={{fontSize:10,background:"#1a56db",color:"#fff",padding:"2px 7px",borderRadius:4,fontWeight:700}}>NOW</span>}
                <span style={{fontSize:11,color:"#9ca3af"}}>{mcs.length} events</span>
              </div>
            </div>
            <div style={{padding:"10px 14px"}}>
              {mcs.length===0 && <div style={{fontSize:12,color:"#d1d5db",padding:"6px 0"}}>No events — use Discover to find some</div>}
              {mcs.map(c=>(
                <div key={c.id} onClick={()=>onEdit(c)} style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f9fafb",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#111827",lineHeight:1.3,flex:1,marginRight:6}}>{c.name}</div>
                    <span style={{fontSize:11,fontWeight:700,color:sc(c.score),flexShrink:0}}>{c.score}/10</span>
                  </div>
                  <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{c.location} · {c.vertical}</div>
                  {c.attendees.length>0 && <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{c.attendees.map(a=>a.split(" ")[0]).join(", ")}</div>}
                  <span style={{display:"inline-block",marginTop:4,background:statusSt[c.status]?.bg,color:statusSt[c.status]?.color,border:`1px solid ${statusSt[c.status]?.border}`,borderRadius:4,padding:"1px 7px",fontSize:10}}>{c.status}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Discover({conferences, onAdd}) {
  const [month, setMonth] = useState("");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [error, setError] = useState("");

  const find = async () => {
    if(!month) { setError("Please select a month first."); return; }
    setLoading(true); setResults([]); setError("");
    const existing = conferences.map(c=>c.name).join(", ");
    const prompt = `You are a conference research specialist for Grain, a B2B fintech that helps PSPs (payment service providers), cross-border payment companies, and businesses with FX exposure manage currency risk.

Find 6-8 relevant conferences happening in ${month} 2026 for Grain to meet PSPs, cross-border payment companies, or companies with significant FX exposure.

Already tracked (do not repeat): ${existing}

For each, provide: name, location, approximate dates, why it's relevant for Grain (PSP/FX/cross-border angle), estimated attendee size, ICP fit score out of 10, recommended action.

Respond ONLY with a valid JSON array, no markdown, no explanation:
[{"name":"...","location":"...","dates":"...","why":"...","size":"...","score":8,"action":"..."}]`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean = text.replace(/```json|```/g,"").trim();
      setResults(JSON.parse(clean));
    } catch(e) {
      setError("Something went wrong. Try again in a moment.");
    }
    setLoading(false);
  };

  const addIt = r => {
    const mo = MONTHS.find(m=>r.dates?.includes(m))||month;
    onAdd({
      id:Date.now(),
      name:r.name,location:r.location,
      quarter:Math.ceil((MONTHS.indexOf(mo)+1)/3)||2,
      month:mo,vertical:"PSP",status:"TBD",
      attendees:[],participation:"Delegate",
      start:r.dates||"",end:"",
      size:parseInt((r.size||"").replace(/[^0-9]/g,""))||null,
      score:Number(r.score)||7,
      notes:r.why||""
    });
  };

  return (
    <div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #f0f0f0",padding:"22px 24px",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:4}}>AI Conference Discovery</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:18,lineHeight:1.6}}>Pick a month and Claude will find PSP, cross-border, and FX-focused events you're not tracking yet. One click adds them to your dashboard.</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{...sel,width:"auto"}}>
            <option value="">Select a month...</option>
            {MONTHS.map(m=><option key={m} value={m}>{m} 2026</option>)}
          </select>
          <button onClick={find} disabled={loading} style={{...btn(),opacity:loading?0.6:1,cursor:loading?"not-allowed":"pointer"}}>
            {loading?"Searching...":"Find conferences →"}
          </button>
        </div>
        {error && <div style={{fontSize:12,color:"#ef4444",marginTop:10}}>{error}</div>}
      </div>

      {loading && (
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #f0f0f0",padding:40,textAlign:"center",color:"#9ca3af",fontSize:13}}>
          Searching for PSP, FX & cross-border events in {month} 2026...
        </div>
      )}

      {results.length>0 && (
        <>
          <div style={{fontSize:13,fontWeight:600,color:"#111827",marginBottom:12}}>Found {results.length} conferences for {month} 2026</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
            {results.map((r,i)=>{
              const already = conferences.some(c=>c.name.toLowerCase()===r.name.toLowerCase());
              return (
                <div key={i} style={{background:"#fff",borderRadius:12,border:"1px solid #f0f0f0",padding:"16px 18px",borderTop:`3px solid ${sc(Number(r.score)||7)}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#111827",lineHeight:1.3,flex:1,marginRight:8}}>{r.name}</div>
                    <span style={{fontSize:12,fontWeight:700,color:sc(Number(r.score)||7),flexShrink:0}}>{r.score}/10</span>
                  </div>
                  <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>{r.location} · {r.dates}</div>
                  <div style={{fontSize:12,color:"#374151",lineHeight:1.55,marginBottom:12}}>{r.why}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,background:"#f3f4f6",color:"#6b7280",padding:"2px 8px",borderRadius:4}}>{r.action}</span>
                    {already
                      ? <span style={{fontSize:11,color:"#9ca3af"}}>Already tracked</span>
                      : <button onClick={()=>addIt(r)} style={{...btn({fontSize:11,padding:"5px 12px"})}}>+ Add to tracker</button>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const [conferences, setConferences] = useState(load);
  const [tab, setTab] = useState("dashboard");
  const [editConf, setEditConf] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [toast, setToast] = useState("");
  const blankForm = {name:"",location:"",quarter:1,month:"Jan",vertical:"PSP",status:"TBD",attendees:[],participation:"",start:"",end:"",size:"",score:7,notes:""};
  const [newForm, setNewForm] = useState(blankForm);
  const [editForm, setEditForm] = useState(null);

  useEffect(()=>save(conferences),[conferences]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2200); };

  const startEdit = c => { setEditConf(c); setEditForm({...c,attendees:[...c.attendees]}); };
  const saveEdit = () => {
    setConferences(p=>p.map(c=>c.id===editConf.id?{...editForm,size:editForm.size===""?null:Number(editForm.size),score:Number(editForm.score)}:c));
    setEditConf(null); setEditForm(null); showToast("Saved!");
  };
  const addConf = () => {
    setConferences(p=>[...p,{...newForm,id:Date.now(),size:newForm.size===""?null:Number(newForm.size),score:Number(newForm.score),attendees:[...newForm.attendees]}]);
    setShowAdd(false); setNewForm(blankForm); showToast("Conference added!");
  };
  const deleteConf = id => { if(window.confirm("Delete this conference?")){ setConferences(p=>p.filter(c=>c.id!==id)); showToast("Deleted."); }};
  const addFromDiscover = c => { setConferences(p=>[...p,c]); showToast(`${c.name} added!`); };

  const TABS = [["dashboard","Dashboard"],["events","All Events"],["planner","Monthly Planner"],["discover","Discover"]];

  return (
    <div style={{minHeight:"100vh",background:"#f8f9fa"}}>
      {/* Nav */}
      <div style={{background:"#111827",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:28}}>
          <div style={{padding:"14px 0"}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",letterSpacing:"-0.01em"}}>Grain</div>
            <div style={{fontSize:10,color:"#6b7280",marginTop:1,letterSpacing:"0.04em",textTransform:"uppercase"}}>Conference Intelligence</div>
          </div>
          <div style={{display:"flex",gap:2}}>
            {TABS.map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 14px",borderRadius:8,border:"none",background:tab===id?"rgba(255,255,255,0.12)":"transparent",color:tab===id?"#fff":"#9ca3af",fontSize:13,fontWeight:tab===id?600:400,cursor:"pointer"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {toast && <span style={{fontSize:12,color:"#34d399",fontWeight:600}}>{toast}</span>}
          <button onClick={()=>setShowAdd(true)} style={{...btn({background:"#1a56db",padding:"7px 16px"})}}>+ Add event</button>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"24px 28px",maxWidth:1320,margin:"0 auto"}}>
        {tab==="dashboard" && <Dashboard conferences={conferences} onEdit={startEdit}/>}
        {tab==="events" && <Events conferences={conferences} onEdit={startEdit} onDelete={deleteConf} onAdd={()=>setShowAdd(true)}/>}
        {tab==="planner" && <Planner conferences={conferences} onEdit={startEdit}/>}
        {tab==="discover" && <Discover conferences={conferences} onAdd={addFromDiscover}/>}
      </div>

      {/* Modals */}
      {editConf && editForm && <ConferenceForm form={editForm} setForm={setEditForm} onSave={saveEdit} onCancel={()=>{setEditConf(null);setEditForm(null);}} title={`Edit — ${editConf.name}`}/>}
      {showAdd && <ConferenceForm form={newForm} setForm={setNewForm} onSave={addConf} onCancel={()=>{setShowAdd(false);setNewForm(blankForm);}} title="Add new conference"/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
